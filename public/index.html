<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>APP de tareas</title>
    <style>
      /* Diseño básico  */
      body {
        font-family: Arial, sans-serif;
        background-color: #f5f5f5;
        color: #555;
      }
      .contenedor {
        width: 400px;
        margin: 50px auto;
      }
      h1,
      h2,
      h3 {
        font-weight: normal;
        color: #666;
      }
      input[type="text"] {
        padding: 5px;
        width: 200px;
      }
      button {
        padding: 5px 10px;
        cursor: pointer;
      }
      ul {
        list-style-type: disc;
        padding: 0 10px;
      }
      li {
        margin-bottom: 10px;
      }
    </style>
  </head>
  <body>
    <div class="contenedor">
      <!-- Contenedor principal -->
      <h1>Una APP de tareas</h1>
      <h2>por hacer como lista</h2>

      <form action="/agregar" method="POST">
        <!-- Formulario para agregar nueva tarea -->
        <input
          type="text"
          name="nuevaTarea"
          placeholder="Escribe tu tarea..."
          maxlength="100"
          pattern="[A-Za-z0-9\sñÑáéíóúÁÉÍÓÚüÜ,.+-:]+"
          title="Solo letras, números y espacios"
        />
        <!-- Campo de entrada para la tarea -->
        <button type="submit">Agrega tarea</button>
        <!-- Botón para enviar el formulario -->
      </form>

      <h3>Tareas por hacer</h3>
      <ul>
        {{LISTA_PENDIENTES}}
        <!-- Placeholder para la lista de tareas pendientes -->
      </ul>

      <h3>Tareas realizadas</h3>
      <ul>
        {{LISTA_REALIZADAS}}
        <!-- Placeholder para la lista de tareas realizadas -->
      </ul>
    </div>
  </body>
</html>
