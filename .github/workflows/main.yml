name: Despliegue Automatico Node

on:
  push:
    branches:
      - main  # Asegúrate de que tu rama se llame 'main' o cámbialo a 'master'

jobs:
  desplegar:
    runs-on: self-hosted

    steps:
      - name: Descargar cambios de GitHub
        run: |
          cd /home/serverst-01/serverst-01/nodejs-app
          git pull origin main
          
      - name: Reiniciar contenedor de Node
        run: |
          cd /home/serverst-01/serverst-01
          sudo docker compose restart nodejs
